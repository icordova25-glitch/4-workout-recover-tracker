name: Extract uploaded project

on:
  push:
    paths:
      - ".github/workflows/extract-project.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-project:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract project into repository root
        shell: bash
        run: |
          set -euo pipefail
          ZIP_FILE="3cordova-coach-ai-v0.2.2-load-fix.zip"

          if [[ ! -f "$ZIP_FILE" ]]; then
            echo "Archive not found: $ZIP_FILE"
            exit 1
          fi

          TEMP_DIR="$(mktemp -d)"
          unzip -q "$ZIP_FILE" -d "$TEMP_DIR"

          SOURCE_DIR="$TEMP_DIR/cordova-coach-ai"
          if [[ ! -d "$SOURCE_DIR" ]]; then
            SOURCE_DIR="$(find "$TEMP_DIR" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          fi

          if [[ -z "${SOURCE_DIR:-}" || ! -d "$SOURCE_DIR" ]]; then
            echo "Unable to locate the extracted project directory."
            exit 1
          fi

          rsync -a --exclude='.git' "$SOURCE_DIR/" ./
          rm -f "$ZIP_FILE"

      - name: Commit extracted project
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No extracted changes to commit."
            exit 0
          fi

          git commit -m "Release v0.2.2 - extract workout recovery tracker project"
          git push origin HEAD:main
